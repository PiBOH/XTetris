name: 🐛 Bug Report
description: Something is broken? Help us fix it!
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        ### 🛠️ Bug Report
        Thank you for reporting! Please fill out the form below.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-flight Checklist
      options:
        - label: Utilizzo [l'ultima versione](https://github.com/PiBOH/XTetris/releases/latest) del gioco.
          required: true
        - label: Ho verificato e non esiste un' altra issue simile.
          required: true

  - type: dropdown
    id: component
    attributes:
      label: 📍 Dove credi che sia il bug?
      description: Select the area of the app.
      options:
        - ⚙️ Menu
        - 📒🧩 Notepad++ Plugin
        - 🧾 Guide
        - 🪟 Windows terminal
        - 💽 Dipendenze
        - 📥 Downloads
        - 🎨 UI / Visuals
        - ❓ Altro
    validations:
      required: true

  - type: dropdown
    id: frequency
    attributes:
      label: 📉 How often does it happen?
      options:
        - 🔴 Sempre (100%)
        - 🟠 Spesso (> 50%)
        - 🟡 A volte (< 50%)
        - 🟢 Raramente (Once or twice)
    validations:
      required: true

  - type: textarea
    id: reproduce-steps
    attributes:
      label: 🔄 Passaggi fatti prima di inciampare nel bug
      description: clear steps lead to a faster fix!
      placeholder: |
        1. Go to ...
        2. Tap on ...
        3. See error
      value: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: 🆚 Cosa dovrebbe succedere vs. Cosa succede
      description: What happened vs. what should have happened.
      placeholder: |
        Expected: Inizio un corso.
        Actual: L'App crasha immediatamente.
    validations:
      required: true

  - type: markdown
    attributes:
      value: "---"
      
  - type: dropdown
    id: win-ver
    attributes:
      label: 🪟 Windows Version?
      options:
        - Windows 11
        - Windows 10
        - Windows 8 / 8.1 (Preview)
        - Windows 7 (Preview)
        - Windows Vista (Preview)
        - Windows XP (Preview)
        - Windows LEGACY VERSION (Preview)
    validations:
      required: true
      
  - type: input
    id: game-version
    attributes:
      label: 📦 Game Version
      placeholder: e.g. 3.0.45 (Check /piboh-script/version.txt)
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 📄 Logs / Screenshots
      description: Paste logs or drag & drop screenshots here.
      render: shell
