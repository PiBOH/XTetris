name: Build and Deploy XTetris (WebAssembly) to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Setup Emscripten SDK
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: latest

      - name: Build XTetris for WebAssembly
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p site

          # Disattiva i busy-wait delay nel build web, per evitare blocchi/freezing del browser
          python3 <<'PY'
          from pathlib import Path
          import re

          main_c = Path("main.c")
          text = main_c.read_text()

          text, _ = re.subn(
              r'void delay\(int time\)\s*\{.*?\n\}',
              'void delay(int time) {\n    (void)time;\n}\n',
              text,
              count=1,
              flags=re.S
          )

          main_c.write_text(text)
          PY

          # Disattiva i codici colore ANSI nel build web
          cat > Elements/color_codes.h <<'EOF'
          #ifndef XTETRIS_COLOR_CODES_H
          #define XTETRIS_COLOR_CODES_H

          #define NERO ""
          #define BIANCO ""
          #define ROSSO ""
          #define VIOLA ""
          #define VERDE ""
          #define GIALLO ""
          #define AZZURRO ""
          #define BLU ""
          #define DEFAULT ""

          #define ROSSOB ""
          #define GIALLOB ""
          #define VIOLAB ""
          #define AZZURROB ""
          #define BIANCOB ""

          #define RESET ""

          #endif
          EOF

          # Shell HTML minimale per visualizzare stdout/stderr nel browser
          cat > shell.html <<'HTML'
          <!DOCTYPE html>
          <html lang="it">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>XTetris - WebAssembly</title>
            <style>
              :root {
                color-scheme: dark;
              }
              body {
                margin: 0;
                font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
                background: #0f172a;
                color: #e2e8f0;
              }
              main {
                max-width: 980px;
                margin: 0 auto;
                padding: 24px;
              }
              h1 {
                margin-top: 0;
                font-size: 2rem;
              }
              .note {
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 10px;
                padding: 16px;
                margin-bottom: 16px;
              }
              #status {
                font-size: 0.95rem;
                color: #93c5fd;
                margin-bottom: 12px;
              }
              textarea {
                width: 100%;
                min-height: 70vh;
                box-sizing: border-box;
                background: #020617;
                color: #e2e8f0;
                border: 1px solid #334155;
                border-radius: 10px;
                padding: 14px;
                resize: vertical;
                font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                font-size: 14px;
                line-height: 1.4;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>XTetris (WebAssembly)</h1>

              <div class="note">
                Questa è una build WebAssembly del progetto originale C da terminale.<br />
                Quando il gioco richiede input, il browser potrebbe mostrare finestre di prompt.
              </div>

              <div id="status">Caricamento...</div>
              <textarea id="output" readonly></textarea>
            </main>

            <script>
              var Module = {
                preRun: [],
                postRun: [],
                setStatus: function (text) {
                  var status = document.getElementById('status');
                  if (status) status.textContent = text || '';
                },
                print: function (text) {
                  if (arguments.length > 1) {
                    text = Array.prototype.slice.call(arguments).join(' ');
                  }
                  var output = document.getElementById('output');
                  if (output) {
                    output.value += text + "\n";
                    output.scrollTop = output.scrollHeight;
                  }
                  console.log(text);
                },
                printErr: function (text) {
                  if (arguments.length > 1) {
                    text = Array.prototype.slice.call(arguments).join(' ');
                  }
                  var output = document.getElementById('output');
                  if (output) {
                    output.value += "[stderr] " + text + "\n";
                    output.scrollTop = output.scrollHeight;
                  }
                  console.error(text);
                }
              };
            </script>

            {{{ SCRIPT }}}
          </body>
          </html>
          HTML

          emcc \
            main.c \
            Tetramino/tetramino.c \
            PianoDiGioco/pianodigioco.c \
            GameSetting/menus.c \
            GameSetting/Player/player.c \
            -O2 \
            -sALLOW_MEMORY_GROWTH=1 \
            -sEXIT_RUNTIME=1 \
            -sASSERTIONS=1 \
            --shell-file shell.html \
            -o site/index.html

          touch site/.nojekyll

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4