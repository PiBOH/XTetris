# Deploy della GitHub Pages statica di PiBOH/XTetris.
#
# Questo workflow pubblica i file statici della cartella `piboh-gpages/`
# (index.html, 404.html, script.js, style.css) direttamente verso GitHub Pages.
#
# Le immagini in `piboh-images/` e il README.md restano nella root del repo:
#   - piboh-images/  → copiate dentro piboh-gpages/ durante il deploy,
#                      referenziate dai file HTML con "piboh-images/..."
#   - README.md      → resta visibile su github.com/PiBOH/XTetris
#
# NOTA: GitHub Pages può ricevere deploy da una sola sorgente
# "GitHub Actions" alla volta. Se anche .github/workflows/deploy.yml
# è attivo e pubblica la build WebAssembly, i due workflow
# si sovrascriveranno a vicenda. Decidi quale tenere attivo:
#
#   - deploy-pages.yml  -> sito statico dalla cartella piboh-gpages/
#   - deploy.yml        -> build WebAssembly di XTetris (versione "playable")
#
# Se vuoi entrambi, sposta la build WASM in un sub-path (es. /play/)
# modificando l'output di deploy.yml in site/play/index.html.

name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'piboh-gpages/**'
      - 'piboh-images/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      - name: Verify required static files exist
        shell: bash
        run: |
          set -euo pipefail
          for f in piboh-gpages/index.html \
                   piboh-gpages/style.css \
                   piboh-gpages/script.js \
                   piboh-gpages/404.html \
                   piboh-images; do
            if [ ! -e "$f" ]; then
              echo "::error::File/cartella statico mancante: $f"
              exit 1
            fi
          done
          echo "Tutti i file statici richiesti sono presenti."

      - name: Create .nojekyll marker
        shell: bash
        run: |
          # .nojekyll disabilita Jekyll su GitHub Pages
          # così i file che iniziano con _ o . non vengono ignorati
          touch piboh-gpages/.nojekyll

      - name: Copy assets into piboh-gpages
        shell: bash
        run: |
          # Le immagini in piboh-images/ restano fuori da piboh-gpages/
          # nel repo. Vengono copiate dentro piboh-gpages/ al momento del
          # deploy così l'upload dell'artifact le include.
          cp -r piboh-images piboh-gpages/
          echo "Contenuto di piboh-gpages/ dopo il copy:"
          ls -la piboh-gpages/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './piboh-gpages'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
